; PlatformIO Project Configuration File
; Analyseur O2 fixe - ESP32-WROOM-32

; Choisir l'environnement selon le type de boutons :
;   esp32-ttp223  → boutons TTP223 (digitalRead, actif HIGH)
;   esp32-touch   → touch natif ESP32 (touchRead < seuil)

[common]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/RTClib @ ^2.1.4
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    adafruit/Adafruit PN532 @ ^1.3.0
    adafruit/Adafruit NeoPixel @ ^1.12.0

build_flags =
    -Wall
    -Wextra

; ── Mode TTP223 (par défaut) ────────────────────────────────────────────────
[env:esp32-ttp223]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
lib_deps    = ${common.lib_deps}
build_flags = ${common.build_flags}
    -DBUTTON_MODE=0

; ── Mode touch natif ESP32 ──────────────────────────────────────────────────
[env:esp32-touch]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
lib_deps    = ${common.lib_deps}
build_flags = ${common.build_flags}
    -DBUTTON_MODE=1
